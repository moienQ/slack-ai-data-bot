# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# PostgreSQL — use DB_URL/DB_USER/DB_PASS (not PG* to avoid Railway auto-injection conflicts)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/analytics?currentSchema=public}
spring.datasource.username=${DB_USER:analytics_user}
spring.datasource.password=${DB_PASS:StrongPassword123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# LangChain Python service URL
langchain.service.url=${LANGCHAIN_SERVICE_URL:http://localhost:5001}

# App name
spring.application.name=slack-ai-data-bot

# Slack credentials — set SLACK_BOT_TOKEN and SLACK_SIGNING_SECRET in Railway env vars
slack.bot.token=${SLACK_BOT_TOKEN:}
slack.signing.secret=${SLACK_SIGNING_SECRET:}
