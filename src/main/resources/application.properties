# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# PostgreSQL — override via SPRING_DATASOURCE_* env vars in Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/analytics?currentSchema=public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:analytics_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:StrongPassword123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# LangChain Python service URL
langchain.service.url=${LANGCHAIN_SERVICE_URL:http://localhost:5001}

# App name
spring.application.name=slack-ai-data-bot

# Slack credentials — set via SLACK_BOT_TOKEN / SLACK_SIGNING_SECRET env vars in Railway
slack.bot.token=${SLACK_BOT_TOKEN:}
slack.signing.secret=${SLACK_SIGNING_SECRET:}
