# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# PostgreSQL — Railway auto-injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:analytics}?currentSchema=public
spring.datasource.username=${PGUSER:analytics_user}
spring.datasource.password=${PGPASSWORD:StrongPassword123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# LangChain Python service URL
langchain.service.url=${LANGCHAIN_SERVICE_URL:http://localhost:5001}

# App name
spring.application.name=slack-ai-data-bot

# Slack credentials — set SLACK_BOT_TOKEN and SLACK_SIGNING_SECRET in Railway env vars
slack.bot.token=${SLACK_BOT_TOKEN:}
slack.signing.secret=${SLACK_SIGNING_SECRET:}
